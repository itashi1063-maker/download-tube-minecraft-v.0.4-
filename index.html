<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ستورم ستوديو - فرن التحميل</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        
        <div class="container">
            <div class="block-icon">🏭</div> 
            <h2>فرن جلب البيانات</h2>
            <p>ضع "الوقود" (الرابط) لبدء صهر البيانات:</p>

            <div class="download-panel">
                <input type="text" id="videoUrl" placeholder="رابط الملف من عالم آخر...">
                <button id="downloadBtn">بدء الصياغة والتحميل ⛏️</button>
            </div>

            <div id="statusMessage"></div>
        </div>

        <div class="steve-container">
            <img src="https://i.ibb.co/27NzkCXw/minecraft-steve.png" alt="ستيف" class="steve-img">
            <div class="minecraft-block smoker-block"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
